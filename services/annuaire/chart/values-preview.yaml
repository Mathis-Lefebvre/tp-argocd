image:
  repository: ghcr.io/binome/annuaire
  tag: dev

replicaCount: 1

ingress:
  enabled: true
  # le vrai host sera injecté par l'ApplicationSet à la volée.
  host: preview.devhub.local

env:
  LOG_LEVEL: debug

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 96Mi
