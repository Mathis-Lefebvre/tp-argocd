# Application ArgoCD : notif-dev
#
# Variante de annuaire.yaml pour le service notif.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notif-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: devhub

  source:
    repoURL: git://host.docker.internal:9000/
    targetRevision: main
    path: services/notif/chart
    helm:
      valueFiles:
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: devhub-dev

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
