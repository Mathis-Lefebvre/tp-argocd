# ApplicationSet preview pour planning.
# Une fois annuaire-preview.yaml fait, dupliquez en adaptant.
#
# TODO : à compléter à partir du modèle annuaire.yaml.

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: planning-preview
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - branch: feature-demo-prof
            branch_slug: feature-demo-prof
  template:
    metadata:
      name: planning-preview-{{branch_slug}}
      labels:
        devhub.io/env: preview
        devhub.io/service: planning
    spec:
      project: devhub
      source:
        repoURL: git://host.docker.internal:9000/
        targetRevision: '{{branch}}'
        path: services/planning/chart
        helm:
          valueFiles:
            - values-preview.yaml
          parameters:
            - name: ingress.host
              value: planning-{{branch_slug}}.devhub.local
      destination:
        server: https://kubernetes.default.svc
        namespace: devhub-preview-{{branch_slug}}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
