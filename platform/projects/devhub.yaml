# AppProject ArgoCD : `devhub`
#
# Un AppProject est votre brique de sécurité. Sans lui, n'importe quelle
# Application peut pointer vers n'importe quel repo et déployer dans
# n'importe quel namespace. C'est dangereux dans une plateforme partagée.
#
# Référence : https://argo-cd.readthedocs.io/en/stable/operator-manual/project-management/
#
# Étape 6 — à compléter.

apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: devhub
  namespace: argocd
spec:
  description: Plateforme DevHub Campus

  sourceRepos:
    - "*"

  destinations:
    - server: https://kubernetes.default.svc
      namespace: devhub-*
    - server: https://kubernetes.default.svc
      namespace: argocd

  clusterResourceWhitelist:
    - group: ""
      kind: Namespace

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  # TODO étape 6 (défi bonus) : ajoutez ici une `roles` (rôle developer)
  # et une `syncWindows` (fenêtre d'interdiction de sync 18h-8h).
  # Voir : https://argo-cd.readthedocs.io/en/stable/operator-manual/project-management/
